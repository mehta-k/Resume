<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Profile | Global Media</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .signup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FF006E 0%, #8338EC 50%, #3A86FF 100%);
            padding: 1rem;
        }

        .signup-box {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .signup-box h1 {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .signup-box p {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.3);
            background: var(--bg-primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 1rem auto;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 110, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .emoji-picker {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-top: 0.5rem;
        }

        .emoji-btn {
            width: 2.5rem;
            height: 2.5rem;
            border: 2px solid transparent;
            background: white;
            border-radius: 8px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .emoji-btn:hover,
        .emoji-btn.selected {
            border-color: var(--primary-color);
            transform: scale(1.1);
        }

        .error-msg {
            color: #FF006E;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .success-msg {
            background: rgba(6, 214, 160, 0.1);
            border: 2px solid #06D6A0;
            color: #06D6A0;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #FF006E 0%, #8338EC 50%, #3A86FF 100%);">
    <div class="signup-container">
        <div class="signup-box">
            <h1>Create Profile</h1>
            <p>Join Global Media and share your story</p>

            <form id="signupForm">
                <div class="form-group">
                    <label>Choose Your Avatar 🎨</label>
                    <div class="avatar-preview" id="avatarPreview">👤</div>
                    <div class="emoji-picker" id="emojiPicker">
                        <button type="button" class="emoji-btn" data-emoji="👤">👤</button>
                        <button type="button" class="emoji-btn" data-emoji="😊">😊</button>
                        <button type="button" class="emoji-btn" data-emoji="🎨">🎨</button>
                        <button type="button" class="emoji-btn" data-emoji="💻">💻</button>
                        <button type="button" class="emoji-btn" data-emoji="🚀">🚀</button>
                        <button type="button" class="emoji-btn" data-emoji="⭐">⭐</button>
                        <button type="button" class="emoji-btn" data-emoji="🎵">🎵</button>
                        <button type="button" class="emoji-btn" data-emoji="📸">📸</button>
                        <button type="button" class="emoji-btn" data-emoji="🌟">🌟</button>
                        <button type="button" class="emoji-btn" data-emoji="💡">💡</button>
                    </div>
                    <input type="hidden" id="selectedEmoji" value="👤">
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your name" required>
                    <div class="error-msg" id="nameError"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input type="text" id="username" name="username" placeholder="@username" required>
                        <div class="error-msg" id="usernameError"></div>
                    </div>
                    <div class="form-group">
                        <label for="followers">Starting Followers</label>
                        <input type="number" id="followers" name="followers" placeholder="0" value="0" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" placeholder="City, Country">
                    </div>
                    <div class="form-group">
                        <label for="website">Website</label>
                        <input type="text" id="website" name="website" placeholder="yoursite.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="joinDate">Join Date</label>
                    <input type="text" id="joinDate" name="joinDate" placeholder="e.g., March 2023" value="March 2026">
                </div>

                <button type="submit" class="submit-btn">Create My Profile ✨</button>
            </form>

            <div class="back-link">
                <p style="margin: 0; color: var(--text-secondary); font-size: 0.9rem;">Already have a profile? 
                    <a href="index.html">Go to Home</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const emojiButtons = document.querySelectorAll('.emoji-btn');
        const avatarPreview = document.getElementById('avatarPreview');
        const selectedEmojiInput = document.getElementById('selectedEmoji');
        const signupForm = document.getElementById('signupForm');

        // Emoji picker
        emojiButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                emojiButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                const emoji = btn.dataset.emoji;
                selectedEmojiInput.value = emoji;
                avatarPreview.textContent = emoji;
                avatarPreview.style.animation = 'none';
                setTimeout(() => {
                    avatarPreview.style.animation = 'pulse 0.6s ease';
                }, 10);
            });
        });

        // Set first emoji as selected
        emojiButtons[0].classList.add('selected');

        // Form validation
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const nameError = document.getElementById('nameError');
            const usernameError = document.getElementById('usernameError');

            nameError.textContent = '';
            usernameError.textContent = '';

            let isValid = true;

            if (!fullName) {
                nameError.textContent = 'Name is required';
                isValid = false;
            }

            if (!username) {
                usernameError.textContent = 'Username is required';
                isValid = false;
            } else if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                usernameError.textContent = 'Username must be 3-20 characters (letters, numbers, underscore)';
                isValid = false;
            }

            if (isValid) {
                // Save profile to localStorage
                const profileData = {
                    fullName: fullName,
                    username: username,
                    emoji: selectedEmojiInput.value,
                    bio: document.getElementById('bio').value,
                    location: document.getElementById('location').value,
                    website: document.getElementById('website').value,
                    joinDate: document.getElementById('joinDate').value,
                    followers: parseInt(document.getElementById('followers').value) || 0,
                    following: Math.floor(Math.random() * 1000) + 100,
                    posts: Math.floor(Math.random() * 500)
                };

                localStorage.setItem('userProfile', JSON.stringify(profileData));

                // Show success and redirect
                signupForm.innerHTML = `
                    <div class="success-msg">
                        ✨ Profile created successfully!<br>
                        Redirecting to your profile...
                    </div>
                `;

                setTimeout(() => {
                    window.location.href = 'user-profile.html';
                }, 2000);
            }
        });

        // Add pulse animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.1); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
