<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Global Media</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .notifications-container {
            max-width: 600px;
            background: var(--bg-primary);
            border-radius: 16px;
            overflow: hidden;
        }

        .notifications-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notifications-header h2 {
            margin: 0;
            color: var(--text-primary);
        }

        .notification-filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0 1rem;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gradient-1);
            color: white;
            border-color: var(--primary-color);
        }

        .notifications-list {
            max-height: 80vh;
            overflow-y: auto;
        }

        .notification-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .notification-item:hover {
            background: var(--hover-bg);
        }

        .notification-item.unread {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.05) 0%, rgba(131, 56, 236, 0.05) 100%);
        }

        .notification-item.unread::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--gradient-1);
        }

        .notification-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-text {
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            line-height: 1.4;
        }

        .notification-text strong {
            color: var(--primary-color);
        }

        .notification-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .notification-action {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .notification-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .notification-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .empty-notifications {
            padding: 3rem 1rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-notifications div {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .mark-read-btn {
            padding: 0.5rem 1rem;
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .mark-read-btn:hover {
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .notifications-container {
                border-radius: 0;
            }

            .notifications-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>Global Media</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="explore.html" class="nav-link">Explore</a>
                <a href="reels.html" class="nav-link">Reels</a>
                <a href="messages.html" class="nav-link">Messages</a>
                <a href="user-profile.html" class="nav-link">Profile</a>
            </div>
            <div class="user-menu">
                <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle dark mode">🌙</button>
                <div id="userAvatarNav" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FF006E 0%, #8338EC 100%); font-size: 1.5rem; cursor: pointer; border: 2px solid var(--primary-color);">👤</div>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; grid-template-columns: 1fr;">
        <main class="feed" style="background: transparent; border: none;">
            <div class="notifications-container">
                <div class="notifications-header">
                    <h2>🔔 Notifications</h2>
                    <button class="mark-read-btn" onclick="markAllAsRead()">Mark all as read</button>
                </div>

                <div class="notification-filters">
                    <button class="filter-btn active" onclick="filterNotifications('all', this)">All</button>
                    <button class="filter-btn" onclick="filterNotifications('likes', this)">❤️ Likes</button>
                    <button class="filter-btn" onclick="filterNotifications('comments', this)">💬 Comments</button>
                    <button class="filter-btn" onclick="filterNotifications('follows', this)">👥 Follows</button>
                    <button class="filter-btn" onclick="filterNotifications('mentions', this)">@️ Mentions</button>
                </div>

                <div class="notifications-list" id="notificationsList"></div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer style="background: linear-gradient(135deg, rgba(255, 0, 110, 0.1) 0%, rgba(131, 56, 236, 0.1) 100%); border-top: 1px solid var(--border-color); padding: 2rem; text-align: center; margin-top: 2rem; color: var(--text-secondary);">
        <p style="margin-bottom: 0.5rem; font-weight: 600;">© 2026 Global Media</p>
        <p style="margin-top: 0.5rem; font-size: 0.85rem;">Connecting people around the world 🌍</p>
    </footer>

    <script>
        const notifications = [
            { id: 1, type: 'likes', avatar: '👩', user: 'Sarah Smith', action: 'liked your post', time: '2m ago', unread: true },
            { id: 2, type: 'follows', avatar: '👨', user: 'Mike Johnson', action: 'started following you', time: '5m ago', unread: true },
            { id: 3, type: 'comments', avatar: '💅', user: 'Jane Doe', action: 'commented on your post: "Amazing! 🔥"', time: '12m ago', unread: true },
            { id: 4, type: 'likes', avatar: '🧑', user: 'Alex Kumar', action: 'liked your post', time: '1h ago', unread: false },
            { id: 5, type: 'mentions', avatar: '👸', user: 'Emma Wilson', action: 'mentioned you in a post', time: '2h ago', unread: false },
            { id: 6, type: 'likes', avatar: '👨‍💼', user: 'Tom Brady', action: 'liked your comment', time: '3h ago', unread: false },
            { id: 7, type: 'follows', avatar: '👩‍💼', user: 'Lisa Anderson', action: 'started following you', time: '4h ago', unread: false },
            { id: 8, type: 'comments', avatar: '🎨', user: 'Creative Dev', action: 'replied to your comment', time: '5h ago', unread: false },
        ];

        let filteredNotifications = notifications;
        let currentFilter = 'all';

        const typeEmojis = {
            likes: '❤️',
            follows: '👥',
            comments: '💬',
            mentions: '✨',
        };

        function renderNotifications() {
            const list = document.getElementById('notificationsList');

            if (filteredNotifications.length === 0) {
                list.innerHTML = `
                    <div class="empty-notifications">
                        <div>🔔</div>
                        <h3>No notifications yet</h3>
                        <p>When someone interacts with you, you'll see it here</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filteredNotifications.map(notif => `
                <div class="notification-item ${notif.unread ? 'unread' : ''}" onclick="openNotification(${notif.id})">
                    <div class="notification-avatar">${notif.avatar}</div>
                    <div class="notification-content">
                        <div class="notification-text">
                            <strong>${notif.user}</strong> ${notif.action}
                        </div>
                        <div class="notification-time">${notif.time}</div>
                        ${notif.type === 'follows' ? `
                            <div class="notification-action">
                                <button class="notification-btn" onclick="followUser(event)">Follow back</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="notification-icon">${typeEmojis[notif.type] || '🔔'}</div>
                </div>
            `).join('');
        }

        function filterNotifications(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (filter === 'all') {
                filteredNotifications = notifications;
            } else {
                filteredNotifications = notifications.filter(n => n.type === filter);
            }

            renderNotifications();
        }

        function markAllAsRead() {
            notifications.forEach(n => n.unread = false);
            renderNotifications();
            showNotificationMsg('All notifications marked as read ✅');
        }

        function openNotification(id) {
            const notif = notifications.find(n => n.id === id);
            if (notif) {
                notif.unread = false;
                renderNotifications();
                alert(`Notification from ${notif.user}\n\n${notif.action}`);
            }
        }

        function followUser(event) {
            event.stopPropagation();
            alert('Following user! 👥');
        }

        function showNotificationMsg(msg) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: linear-gradient(135deg, #FF006E 0%, #8338EC 100%);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
            `;
            notification.textContent = msg;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        // Initialize
        renderNotifications();

        // Dark mode toggle
        document.getElementById('darkModeToggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            this.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
